<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anivox - Werkgebied</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html, body {
    margin: 0;
    padding: 0;
    font-family: Arial, Helvetica, sans-serif;
}

#map {
    width: 100%;
    height: 100vh;
}

.info {
    background: white;
    padding: 15px;
    border-radius: 12px;
    box-shadow: 0 2px 10px rgba(0,0,0,.25);
    max-width: 260px;
}

.info h3{
    margin-top:0;
    color:#2E7D32;
}

.info p{
    margin:8px 0;
}

.leaflet-popup-content{
    font-size:15px;
}
</style>
</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
51.13727289838565, 5.415526424012341
// Pas deze eventueel aan naar je eigen coördinaten
const latitude = 51.14;
const longitude = 5.42;

// Kaart
const map = L.map('map');

// OpenStreetMap
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    maxZoom:19,
    attribution:'© OpenStreetMap contributors'
}).addTo(map);

// Marker
const marker = L.marker([latitude, longitude]).addTo(map);

marker.bindPopup(`
<h3>Anivox</h3>

<b>Werkgebied</b><br><br>

✔ Aan-huisconsulten binnen een straal van <b>40 km</b>.<br><br>

🌐 Buiten deze zone zijn online consulten mogelijk.
`);

// Cirkel
const circle = L.circle([latitude, longitude],{
    radius:40000,
    color:"#2E7D32",
    weight:3,
    fillColor:"#66BB6A",
    fillOpacity:0.25
}).addTo(map);

// Toon volledige cirkel
map.fitBounds(circle.getBounds(),{
    padding:[40,40]
});

// Legenda
const info = L.control({position:'topright'});

info.onAdd = function (){

    const div = L.DomUtil.create('div','info');

    div.innerHTML = `
        <h3>Anivox</h3>

        <p>🟢 <b>Aan-huisconsulten</b></p>

        <p>Binnen een straal van <b>40 km</b> rond Helchteren.</p>

        <hr>

        <p>🌐 <b>Buiten deze zone</b></p>

        <p>Online consulten mogelijk.</p>
    `;

    return div;

};

info.addTo(map);

</script>

</body>
</html>
