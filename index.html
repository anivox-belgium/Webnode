<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Anivox Werkgebied</title>

    <link rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        html, body {
            margin:0;
            padding:0;
        }

        #map {
            width:100%;
            height:600px;
        }

        .legend {
            background:white;
            padding:10px;
            border-radius:8px;
            box-shadow:0 0 10px rgba(0,0,0,.2);
            line-height:1.5em;
        }
    </style>
</head>
<body>

<div id="map"></div>

<script>

const lat = 51.1303;
const lng = 5.45952;

const map = L.map('map').setView([lat, lng], 10);

console.log("Leaflet geladen");

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution:'© OpenStreetMap'
}).addTo(map);

// Marker
L.marker([lat,lng])
.addTo(map)
.bindPopup("<b>Anivox</b><br>Vertrekpunt");

// Cirkel van 40 km
L.circle([lat,lng], {
    radius:15000,
    color:'#2E7D32',
    fillColor:'#66BB6A',
    fillOpacity:0.25,
    weight:2
}).addTo(map);

// Legenda
const legend = L.control({position:'bottomright'});

legend.onAdd = function () {

    const div = L.DomUtil.create('div','legend');

    div.innerHTML = `
        <h4>Anivox</h4>

        🟢 Consulten aan huis<br>
        Binnen 15 km rondom Peer<br><br>

        🌐 Buiten deze zone<br>
        Enkel online consulten
    `;

    return div;
};

legend.addTo(map);

</script>

</body>
</html>
